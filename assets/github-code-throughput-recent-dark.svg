  <text x="56" y="518" fill="#8b949e" font-size="11"><tspan x="56" dy="0">Includes owned public and private repositories via the authenticated GitHub CLI session. Measures code movement as</tspan><tspan x="56" dy="15">additions + deletions on default-branch commits authored by SebastianBoehler. 2 repositories were skipped because</tspan><tspan x="56" dy="15">GitHub returned transient API errors.</tspan></text>
