<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="568" viewBox="0 0 860 568" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub throughput for SebastianBoehler</title>
  <desc id="desc">Monthly changed lines over the last 13 months with current month versus the same month last year.</desc>
  <style>
