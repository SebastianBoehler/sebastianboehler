  <rect x="28" y="16" width="804" height="536" fill="#f6f8fa" stroke="#d0d7de" />
  <text x="56" y="54" fill="#1f2328" font-size="22" font-weight="700">GitHub code throughput</text>
  <text x="56" y="78" fill="#57606a" font-size="12"><tspan x="56" dy="0">Monthly additions + deletions across 65 owned repositories, public and private. Current</tspan><tspan x="56" dy="16">month cards are month-to-date and compared against the same day range last year.</tspan></text>
  <rect x="56" y="108" width="174" height="104" fill="#ffffff" stroke="#d8dee4" />
  <text x="72" y="132" fill="#656d76" font-size="11" font-weight="600">July 2026 MTD</text>
