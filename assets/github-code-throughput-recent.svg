  <rect x="28" y="16" width="804" height="536" fill="#0d1117" stroke="#30363d" />
  <text x="56" y="54" fill="#f0f6fc" font-size="22" font-weight="700">GitHub code throughput</text>
  <text x="56" y="78" fill="#8b949e" font-size="12"><tspan x="56" dy="0">Monthly additions + deletions across 63 owned repositories, public and private. Current</tspan><tspan x="56" dy="16">month cards are month-to-date and compared against the same day range last year.</tspan></text>
  <rect x="56" y="108" width="174" height="104" fill="#111827" stroke="#21262d" />
