<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="568" viewBox="0 0 860 568" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub throughput for SebastianBoehler</title>
  <desc id="desc">Monthly changed lines over the last 13 months with current month versus the same month last year.</desc>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
  </style>
  <rect x="28" y="16" width="804" height="536" fill="#f6f8fa" stroke="#d0d7de" />
  <text x="56" y="54" fill="#1f2328" font-size="22" font-weight="700">GitHub code throughput</text>
  <text x="56" y="78" fill="#57606a" font-size="12"><tspan x="56" dy="0">Monthly additions + deletions across 59 owned repositories, public and private. Current</tspan><tspan x="56" dy="16">month cards are month-to-date and compared against the same day range last year.</tspan></text>
  <rect x="56" y="108" width="174" height="104" fill="#ffffff" stroke="#d8dee4" />
  <text x="72" y="132" fill="#656d76" font-size="11" font-weight="600">May 2026 MTD</text>
  <text x="72" y="166" fill="#1f2328" font-size="24" font-weight="700">51,778 LOC</text>
  <text x="72" y="190" fill="#57606a" font-size="11">57 commits</text>
  <rect x="244" y="108" width="174" height="104" fill="#ffffff" stroke="#d8dee4" />
  <text x="260" y="132" fill="#656d76" font-size="11" font-weight="600">May 2025 MTD</text>
  <text x="260" y="166" fill="#1f2328" font-size="22" font-weight="700">117,041 LOC</text>
  <text x="260" y="190" fill="#57606a" font-size="11">50 commits</text>
  <rect x="432" y="108" width="174" height="104" fill="#ffffff" stroke="#d8dee4" />
  <text x="448" y="132" fill="#656d76" font-size="11" font-weight="600">Month YoY</text>
  <text x="448" y="166" fill="#1f2328" font-size="24" font-weight="700">-56%</text>
  <text x="448" y="190" fill="#57606a" font-size="11">908 LOC / commit</text>
  <rect x="620" y="108" width="174" height="104" fill="#ffffff" stroke="#d8dee4" />
  <text x="636" y="132" fill="#656d76" font-size="11" font-weight="600">YTD YoY</text>
  <text x="636" y="166" fill="#1f2328" font-size="24" font-weight="700">19.7x</text>
  <text x="636" y="190" fill="#57606a" font-size="10">4,464,294 vs 226,867 LOC</text>
  <text x="56" y="248" fill="#656d76" font-size="11">Monthly changed LOC</text>
  <text x="804" y="248" fill="#57606a" font-size="11" text-anchor="end">2,014 commits tracked through May 7, 2026</text>
